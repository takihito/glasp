name: 'glasp'
description: 'Install glasp — a high-performance Google Apps Script CLI — and authenticate for CI use'
branding:
  icon: 'upload-cloud'
  color: 'blue'

inputs:
  version:
    description: 'glasp version to install (e.g., v1.0.0). Defaults to latest release.'
    required: false
    default: ''
  auth:
    description: |
      JSON content of .clasprc.json for authentication.
      Store this value as a repository secret (e.g. GLASP_AUTH) and reference it
      via secrets.GLASP_AUTH in your workflow. When provided, the value is
      exported as the GLASP_AUTH environment variable so that subsequent glasp
      commands authenticate without a --auth flag.
    required: false
    default: ''
  working-directory:
    description: |
      Directory containing .clasp.json. Relative paths are resolved from the
      workspace root. When provided, the value is exported as the GLASP_DIR
      environment variable so that all subsequent glasp commands run from
      that directory without a --dir flag.
    required: false
    default: ''
  client-id:
    description: |
      OAuth2 client ID. Store this value as a repository or organization
      secret (e.g. GLASP_CLIENT_ID) and reference it via
      secrets.GLASP_CLIENT_ID in your workflow. When provided, exported as
      the GLASP_CLIENT_ID environment variable so that subsequent glasp
      commands use these credentials instead of the built-in defaults.
      Must be provided together with client-secret.
    required: false
    default: ''
  client-secret:
    description: |
      OAuth2 client secret. Store this value as a repository or organization
      secret (e.g. GLASP_CLIENT_SECRET) and reference it via
      secrets.GLASP_CLIENT_SECRET in your workflow. When provided, exported
      as the GLASP_CLIENT_SECRET environment variable so that subsequent
      glasp commands use these credentials instead of the built-in defaults.
      Must be provided together with client-id.
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Install glasp
      shell: bash
      env:
        GLASP_VERSION: ${{ inputs.version }}
        GLASP_INSTALL_DIR: ${{ runner.temp }}/glasp-bin
        GLASP_ACTION_PATH: ${{ github.action_path }}
      run: |
        mkdir -p "$GLASP_INSTALL_DIR"
        sh "$GLASP_ACTION_PATH/docs/install.sh"
        echo "$GLASP_INSTALL_DIR" >> "$GITHUB_PATH"

    - name: Export GLASP_AUTH
      if: ${{ inputs.auth != '' }}
      shell: bash
      env:
        _INPUT_AUTH: ${{ inputs.auth }}
      run: |
        delimiter="GLASP_AUTH_$(LC_ALL=C tr -dc 'a-f0-9' < /dev/urandom | head -c 16 2>/dev/null || date +%s)"
        printf 'GLASP_AUTH<<%s\n%s\n%s\n' "$delimiter" "$_INPUT_AUTH" "$delimiter" >> "$GITHUB_ENV"

    - name: Export OAuth credentials
      if: ${{ inputs.client-id != '' || inputs.client-secret != '' }}
      shell: bash
      env:
        _INPUT_CLIENT_ID: ${{ inputs.client-id }}
        _INPUT_CLIENT_SECRET: ${{ inputs.client-secret }}
      run: |
        if [ -n "$_INPUT_CLIENT_ID" ] && [ -z "$_INPUT_CLIENT_SECRET" ]; then
          echo "Error: 'client-id' is set but 'client-secret' is missing. Both must be provided together." >&2
          exit 1
        fi
        if [ -z "$_INPUT_CLIENT_ID" ] && [ -n "$_INPUT_CLIENT_SECRET" ]; then
          echo "Error: 'client-secret' is set but 'client-id' is missing. Both must be provided together." >&2
          exit 1
        fi
        delim_id="GLASP_CLIENT_ID_$(LC_ALL=C tr -dc 'a-f0-9' < /dev/urandom | head -c 16 2>/dev/null || date +%s)"
        printf 'GLASP_CLIENT_ID<<%s\n%s\n%s\n' "$delim_id" "$_INPUT_CLIENT_ID" "$delim_id" >> "$GITHUB_ENV"
        delim_secret="GLASP_CLIENT_SECRET_$(LC_ALL=C tr -dc 'a-f0-9' < /dev/urandom | head -c 16 2>/dev/null || date +%s)"
        printf 'GLASP_CLIENT_SECRET<<%s\n%s\n%s\n' "$delim_secret" "$_INPUT_CLIENT_SECRET" "$delim_secret" >> "$GITHUB_ENV"

    - name: Export GLASP_DIR
      if: ${{ inputs.working-directory != '' }}
      shell: bash
      env:
        _INPUT_DIR: ${{ inputs.working-directory }}
      run: |
        set -euo pipefail
        resolved_dir="$(cd "$GITHUB_WORKSPACE/$_INPUT_DIR" 2>/dev/null && pwd)"
        if [ -z "$resolved_dir" ] || [ ! -d "$resolved_dir" ]; then
          echo "Invalid working-directory: '$_INPUT_DIR' does not exist under $GITHUB_WORKSPACE" >&2
          exit 1
        fi
        printf 'GLASP_DIR=%s\n' "$resolved_dir" >> "$GITHUB_ENV"
